<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aniket Dhuri | Developer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      padding: 60px 40px;
      border: 1px solid #333;
      border-radius: 16px;
      max-width: 500px;
      background: #1a1a1a;
    }

    .emoji { font-size: 64px; margin-bottom: 20px; }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .title {
      color: #888;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .tag {
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #ccc;
    }

    .goal {
      background: #1f3a1f;
      border: 1px solid #2d6a2d;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #90ee90;
      margin-bottom: 28px;
    }

    a.github {
      display: inline-block;
      background: #ffffff;
      color: #000000;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    a.github:hover { background: #ddd; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🚀</div>
    <h1>Aniket Dhuri</h1>
    <p class="title">AI Automation & No-Code Developer</p>

    <div class="tags">
      <span class="tag">n8n</span>
      <span class="tag">Supabase</span>
      <span class="tag">FlutterFlow</span>
      <span class="tag">React</span>
      <span class="tag">JavaScript</span>
      <span class="tag">Automation</span>
    </div>

    <div class="goal">
      🎯 90-Day Sprint — Becoming job-ready & client-ready
    </div>

    <a class="github" href="https://github.com/dhurianii" target="_blank">
      View GitHub →
    </a>
  </div>
</body>
</html>
